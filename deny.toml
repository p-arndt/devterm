# cargo-deny — license, advisory and source checks.
# Run in CI (see .github/workflows/ci.yml).

[advisories]
version = 2
yanked = "deny"
# Ignored advisories are all deep transitive deps with no upgrade path under our
# current winit/wgpu versions, and none are reachable from devterm's usage.
# Revisit when winit / smithay-client-toolkit / wgpu are bumped.
ignore = [
    # quick-xml DoS on untrusted XML. Only pulled in by wayland-scanner, which
    # parses the trusted Wayland protocol XML files bundled at build time — never
    # attacker-controlled input. wayland-scanner 0.31.10 pins quick-xml "^0.39",
    # so the fixed 0.41 can't be selected without a winit major bump.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # paste: unmaintained, no safe upgrade. Build-time proc-macro via metal/wgpu-hal.
    "RUSTSEC-2024-0436",
    # ttf-parser: unmaintained, no safe upgrade. Transitive via fontdb / ab_glyph.
    "RUSTSEC-2026-0192",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
